<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>DemCRM</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- ==================== ЭКРАН АВТОРИЗАЦИИ ==================== -->
<div id="loginScreen" class="login-screen">
  <form id="loginForm" class="login-card">
    <div class="login-logo">Dem<span>CRM</span></div>
    <div class="field">
      <label>Email</label>
      <input type="email" id="loginEmail" required autocomplete="username" />
    </div>
    <div class="field">
      <label>Пароль</label>
      <input type="password" id="loginPassword" required autocomplete="current-password" />
    </div>
    <label class="checkbox-row">
      <input type="checkbox" id="loginRemember" checked />
      <span>Запомнить меня</span>
    </label>
    <button type="submit" class="btn btn-primary btn-block">Войти</button>
    <div id="loginError" class="login-error"></div>
  </form>
</div>

<!-- ==================== ПРИЛОЖЕНИЕ ==================== -->
<div id="app" class="app hidden">

  <!-- боковая панель -->
  <aside class="sidebar">
    <div class="sidebar-logo">Dem<span>CRM</span></div>
    <nav class="sidebar-nav">
      <button class="nav-item" data-view="vacancies">
        <svg viewBox="0 0 24 24" width="18" height="18"><path d="M4 7h16M4 12h16M4 17h10" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/></svg>
        <span>Вакансии</span>
      </button>
      <button class="nav-item" data-view="candidates">
        <svg viewBox="0 0 24 24" width="18" height="18"><circle cx="12" cy="8" r="4" stroke="currentColor" stroke-width="2" fill="none"/><path d="M4 20c0-4 4-6 8-6s8 2 8 6" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/></svg>
        <span>База кандидатов</span>
      </button>
      <button class="nav-item" data-view="analytics">
        <svg viewBox="0 0 24 24" width="18" height="18"><path d="M4 20V10M12 20V4M20 20v-7" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/></svg>
        <span>Аналитика</span>
      </button>
      <button class="nav-item" data-view="users" id="navUsers">
        <svg viewBox="0 0 24 24" width="18" height="18"><circle cx="9" cy="8" r="3" stroke="currentColor" stroke-width="2" fill="none"/><path d="M2 20c0-3 3-5 7-5s7 2 7 5M16 4c1.7 0 3 1.3 3 3s-1.3 3-3 3M17 12c2.3.3 4 2 4 4" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/></svg>
        <span>Пользователи</span>
      </button>
    </nav>
    <button class="nav-item settings-btn" id="openSettings">
      <svg viewBox="0 0 24 24" width="18" height="18"><circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2" fill="none"/><path d="M19.4 15a1.6 1.6 0 00.3 1.8l.1.1a2 2 0 11-2.8 2.8l-.1-.1a1.6 1.6 0 00-1.8-.3 1.6 1.6 0 00-1 1.5V21a2 2 0 11-4 0v-.1a1.6 1.6 0 00-1-1.5 1.6 1.6 0 00-1.8.3l-.1.1a2 2 0 11-2.8-2.8l.1-.1a1.6 1.6 0 00.3-1.8 1.6 1.6 0 00-1.5-1H3a2 2 0 110-4h.1a1.6 1.6 0 001.5-1 1.6 1.6 0 00-.3-1.8l-.1-.1a2 2 0 112.8-2.8l.1.1a1.6 1.6 0 001.8.3H9a1.6 1.6 0 001-1.5V3a2 2 0 114 0v.1a1.6 1.6 0 001 1.5 1.6 1.6 0 001.8-.3l.1-.1a2 2 0 112.8 2.8l-.1.1a1.6 1.6 0 00-.3 1.8V9a1.6 1.6 0 001.5 1H21a2 2 0 110 4h-.1a1.6 1.6 0 00-1.5 1z" stroke="currentColor" stroke-width="1.5" fill="none"/></svg>
      <span>Настройки</span>
    </button>
  </aside>

  <!-- основная область -->
  <div class="main">
    <header class="topbar" id="topbar">
      <!-- рендерится динамически из app.js -->
    </header>
    <main class="workspace" id="workspace">
      <!-- рендерится динамически из app.js -->
    </main>
  </div>
</div>

<!-- ==================== МОДАЛЬНЫЕ ОКНА (контейнер) ==================== -->
<div id="modalRoot"></div>

<!-- ==================== УВЕДОМЛЕНИЯ ==================== -->
<div id="toastRoot" class="toast-root"></div>

<!-- ==================== ГЛОБАЛЬНЫЙ ПОИСК ==================== -->
<div id="globalSearchOverlay" class="modal-overlay hidden">
  <div class="global-search">
    <input type="text" id="globalSearchInput" placeholder="Поиск кандидатов, вакансий, руководителей…" autocomplete="off" />
    <div id="globalSearchResults" class="global-search-results"></div>
    <div class="global-search-hint">Esc — закрыть</div>
  </div>
</div>

<script type="module" src="app.js"></script>
</body>
</html>
