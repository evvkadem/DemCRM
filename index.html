<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>DemCRM</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ==================== ЭКРАН ВХОДА ==================== -->
  <div id="login-screen" class="login-screen">
    <form id="login-form" class="login-card">
      <div class="login-logo">DemCRM</div>
      <p class="login-sub">вход в систему</p>

      <label class="field">
        <span class="field-label">email</span>
        <input type="email" id="login-email" required autocomplete="username" />
      </label>

      <label class="field">
        <span class="field-label">пароль</span>
        <input type="password" id="login-password" required autocomplete="current-password" />
      </label>

      <label class="checkbox-field">
        <input type="checkbox" id="login-remember" checked />
        <span>запомнить меня</span>
      </label>

      <div id="login-error" class="form-error" hidden></div>

      <button type="submit" class="btn btn-primary btn-block">войти</button>
    </form>
  </div>

  <!-- ==================== ПРИЛОЖЕНИЕ ==================== -->
  <div id="app" class="app" hidden>

    <!-- боковая панель -->
    <aside class="sidebar">
      <div class="sidebar-logo">DemCRM</div>

      <nav class="sidebar-nav">
        <button class="nav-item active" data-section="vacancies">
          <svg class="icon" viewBox="0 0 24 24"><path d="M3 7a2 2 0 0 1 2-2h4l2-2h2l2 2h4a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V7Z"/></svg>
          <span>вакансии</span>
        </button>
        <button class="nav-item" data-section="candidates">
          <svg class="icon" viewBox="0 0 24 24"><path d="M4 19v-1a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4v1M12 11a4 4 0 1 0 0-8 4 4 0 0 0 0 8Z"/></svg>
          <span>база кандидатов</span>
        </button>
        <button class="nav-item" data-section="analytics">
          <svg class="icon" viewBox="0 0 24 24"><path d="M21 12v3a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V9a2 2 0 0 1 2-2h3M7 17v-7M12 17v-5M17 17v-3M21 8l-4-4-4 4"/></svg>
          <span>аналитика</span>
        </button>
        <button class="nav-item" data-section="users" data-admin-only>
          <svg class="icon" viewBox="0 0 24 24"><path d="M17 20v-1a4 4 0 0 0-4-4H7a4 4 0 0 0-4 4v1M9 11a4 4 0 1 0 0-8 4 4 0 0 0 0 8Zm10 9v-1a3.5 3.5 0 0 0-2.5-3.36M15 3.13a3.5 3.5 0 0 1 0 6.74"/></svg>
          <span>пользователи</span>
        </button>
      </nav>

      <div class="sidebar-bottom">
        <button id="user-profile-btn" class="sidebar-user">
          <span id="user-avatar" class="avatar-sm">?</span>
          <span id="user-name" class="sidebar-user-name">—</span>
        </button>
        <button id="settings-btn" class="nav-item">
          <svg class="icon" viewBox="0 0 24 24"><path d="M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6Zm7.4-3a7.4 7.4 0 0 1-.1 1.2l2 1.6-2 3.4-2.4-1a7.6 7.6 0 0 1-2 1.2l-.4 2.6H9.5l-.4-2.6a7.6 7.6 0 0 1-2-1.2l-2.4 1-2-3.4 2-1.6A7.4 7.4 0 0 1 4.6 12a7.4 7.4 0 0 1 .1-1.2l-2-1.6 2-3.4 2.4 1a7.6 7.6 0 0 1 2-1.2l.4-2.6h5l.4 2.6a7.6 7.6 0 0 1 2 1.2l2.4-1 2 3.4-2 1.6c.07.4.1.8.1 1.2Z"/></svg>
          <span>настройки</span>
        </button>
      </div>
    </aside>

    <!-- основная область -->
    <main class="main">

      <!-- ---------- вакансии ---------- -->
      <section id="section-vacancies" class="section active">
        <header class="section-header">
          <h1>вакансии</h1>
          <div class="section-actions">
            <div class="search-box">
              <svg class="icon icon-sm" viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
              <input type="text" id="vacancy-search" placeholder="поиск вакансий..." />
            </div>
            <select id="vacancy-filter" class="select">
              <option value="all">все статусы</option>
              <option value="active">активна</option>
              <option value="paused">приостановлена</option>
              <option value="closed">закрыта</option>
            </select>
            <button id="add-vacancy-btn" class="btn btn-primary">+ добавить вакансию</button>
          </div>
        </header>

        <div id="vacancies-grid" class="grid-cards"></div>
        <div id="vacancies-empty" class="empty-state" hidden>пока нет вакансий</div>
      </section>

      <!-- ---------- kanban ---------- -->
      <section id="section-kanban" class="section">
        <header class="section-header">
          <button id="kanban-back" class="btn btn-ghost">← назад к вакансиям</button>
          <h1 id="kanban-title">—</h1>
          <div class="section-actions">
            <button id="add-candidate-btn" class="btn btn-primary">+ добавить кандидата</button>
          </div>
        </header>

        <!-- собеседования на сегодня -->
        <div class="today-interviews-block">
          <h3 class="today-interviews-title">собеседования на сегодня</h3>
          <div id="today-interviews" class="today-interviews-list"></div>
        </div>

        <div id="kanban-board" class="kanban-board"></div>
      </section>

      <!-- ---------- база кандидатов ---------- -->
      <section id="section-candidates" class="section">
        <header class="section-header">
          <h1>база кандидатов</h1>
          <div class="section-actions">
            <div class="search-box">
              <svg class="icon icon-sm" viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
              <input type="text" id="candidates-search" placeholder="имя, телефон, вакансия..." />
            </div>
            <select id="candidates-filter-vacancy" class="select"><option value="all">все вакансии</option></select>
            <select id="candidates-filter-stage" class="select"><option value="all">все этапы</option></select>
            <select id="candidates-filter-source" class="select">
              <option value="all">все источники</option>
              <option value="hh">hh</option>
              <option value="avito">авито</option>
              <option value="other">прочее</option>
            </select>
            <button id="export-candidates-btn" class="btn btn-secondary">экспорт</button>
            <button id="import-candidates-btn" class="btn btn-secondary">импорт</button>
          </div>
        </header>
        <div class="table-wrap">
          <table class="data-table">
            <thead>
              <tr>
                <th>имя</th><th>телефон</th><th>вакансия</th><th>этап</th><th>источник</th><th>дата</th><th>рекрутер</th><th>теги</th>
              </tr>
            </thead>
            <tbody id="candidates-table-body"></tbody>
          </table>
        </div>
      </section>

      <!-- ---------- аналитика ---------- -->
      <section id="section-analytics" class="section">
        <header class="section-header">
          <h1>аналитика</h1>
        </header>
        <div id="analytics-content"></div>
      </section>

      <!-- ---------- пользователи ---------- -->
      <section id="section-users" class="section">
        <header class="section-header">
          <h1>пользователи</h1>
          <div class="section-actions">
            <button id="add-user-btn" class="btn btn-primary">+ создать пользователя</button>
          </div>
        </header>
        <div class="table-wrap">
          <table class="data-table">
            <thead><tr><th>имя</th><th>email</th><th>телефон</th><th>роль</th><th></th></tr></thead>
            <tbody id="users-table-body"></tbody>
          </table>
        </div>
      </section>

    </main>
  </div>

  <!-- ==================== МОДАЛЬНЫЕ ОКНА ==================== -->
  <div id="modal-root" class="modal-root"></div>

  <!-- ==================== ТОСТЫ ==================== -->
  <div id="toast-root" class="toast-root"></div>

  <script type="module" src="app.js"></script>
</body>
</html>
